name: Backend CI

# Quand est-ce que ça se déclenche ?
on:
  push:
    branches: [ "main" ]
    paths:
      - 'backend/**' # Seulement si on touche au dossier backend
  pull_request:
    branches: [ "main" ]
    paths:
      - 'backend/**'

jobs:
  build-and-test:
    runs-on: ubuntu-latest # On utilise une machine virtuelle Linux

    defaults:
      run:
        working-directory: ./backend # On se place dans le dossier backend

    steps:
    - name: Récupération du code
      uses: actions/checkout@v4

    - name: Installation de Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: backend/package-lock.json

    - name: Installation des dépendances
      run: npm ci

    - name: Vérification du style (Lint)
      run: npm run lint

    - name: Compilation (Build)
      run: npm run build

    - name: Tests unitaires
      run: npm run test
